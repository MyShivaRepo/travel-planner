services:
  travel-planner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: travel-planner
    ports:
      - "8501:8501"
    environment:
      # La clé API peut aussi être saisie directement dans l'IHM
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
